name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject invite code
        env:
          INVITE_CODE: ${{ secrets.INVITE_CODE }}
        run: python3 -c "import os; c=open('main.js').read(); open('main.js','w').write(c.replace('__INVITE_CODE__',os.environ['INVITE_CODE']))"

      - name: Verify injection
        run: |
          if grep -q '__INVITE_CODE__' main.js; then
            echo "ERROR: placeholder was not replaced"
            exit 1
          else
            echo "OK: invite code injected successfully"
          fi

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
